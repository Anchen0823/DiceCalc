<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>博德之门3 · 检定概率计算器</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Cinzel:wght@400;600;700&family=Noto+Serif+SC:wght@400;600;700&display=swap" rel="stylesheet">
  <style>
    :root {
      --bg-deep: #0d0f12;
      --bg-panel: #151a1f;
      --bg-card: #1a2028;
      --border: #2a3542;
      --text: #e8e6e3;
      --text-dim: #9ca3af;
      --accent: #c9a227;
      --accent-glow: #e8c547;
      --success: #4ade80;
      --fail: #f87171;
      --d20-gold: #d4af37;
    }

    * {
      box-sizing: border-box;
    }

    body {
      margin: 0;
      min-height: 100vh;
      background: var(--bg-deep);
      color: var(--text);
      font-family: 'Noto Serif SC', serif;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      padding: 2rem;
      background-image:
        radial-gradient(ellipse 80% 50% at 50% -20%, rgba(201, 162, 39, 0.08), transparent),
        radial-gradient(ellipse 60% 40% at 80% 100%, rgba(74, 222, 128, 0.04), transparent);
    }

    h1 {
      font-family: 'Cinzel', 'Noto Serif SC', serif;
      font-weight: 700;
      font-size: 1.75rem;
      letter-spacing: 0.08em;
      color: var(--accent);
      margin: 0 0 0.25rem 0;
      text-shadow: 0 0 20px rgba(201, 162, 39, 0.3);
    }

    .subtitle {
      font-size: 0.9rem;
      color: var(--text-dim);
      margin-bottom: 2rem;
    }

    .panel {
      background: var(--bg-panel);
      border: 1px solid var(--border);
      border-radius: 12px;
      padding: 1.75rem 2rem;
      min-width: 320px;
      max-width: 420px;
      box-shadow: 0 8px 32px rgba(0, 0, 0, 0.4);
    }

    .row {
      display: flex;
      align-items: center;
      gap: 1rem;
      margin-bottom: 1.25rem;
    }

    .row:last-of-type {
      margin-bottom: 0;
    }

    label {
      flex: 0 0 100px;
      font-size: 0.95rem;
      color: var(--text-dim);
    }

    select:not(.modifier-row select) {
      flex: 1;
      min-width: 0;
      background: var(--bg-card);
      border: 1px solid var(--border);
      border-radius: 8px;
      padding: 0.6rem 0.9rem;
      color: var(--text);
      font-size: 1rem;
      font-family: inherit;
      cursor: pointer;
    }

    select:not(.modifier-row select):focus {
      outline: none;
      border-color: var(--accent);
    }

    input[type="number"],
    input[type="text"] {
      flex: 1;
      background: var(--bg-card);
      border: 1px solid var(--border);
      border-radius: 8px;
      padding: 0.6rem 0.9rem;
      color: var(--text);
      font-size: 1.1rem;
      font-family: inherit;
    }

    input[type="number"]:focus,
    input[type="text"]:focus {
      outline: none;
      border-color: var(--accent);
      box-shadow: 0 0 0 2px rgba(201, 162, 39, 0.2);
    }

    .modifiers-section {
      margin-top: 0.5rem;
    }

    .modifiers-section .section-label {
      font-size: 0.95rem;
      color: var(--text-dim);
      margin-bottom: 0.6rem;
    }

    .modifier-row {
      display: flex;
      align-items: center;
      gap: 0.5rem;
      margin-bottom: 0.5rem;
    }

    .modifier-row select {
      flex: 0 0 72px;
      background: var(--bg-card);
      border: 1px solid var(--border);
      border-radius: 8px;
      padding: 0.5rem 0.5rem;
      color: var(--text);
      font-size: 0.95rem;
      font-family: inherit;
      cursor: pointer;
    }

    .modifier-row .mod-input {
      flex: 1;
      min-width: 0;
    }

    .modifier-row .mod-input input {
      width: 100%;
    }

    .modifier-row .btn-del {
      flex: 0 0 32px;
      height: 36px;
      background: var(--bg-card);
      border: 1px solid var(--border);
      border-radius: 8px;
      color: var(--text-dim);
      cursor: pointer;
      font-size: 1.1rem;
      line-height: 1;
      padding: 0;
      transition: color 0.15s, border-color 0.15s;
    }

    .modifier-row .btn-del:hover {
      color: var(--fail);
      border-color: var(--fail);
    }

    .btn-add-mod {
      margin-top: 0.5rem;
      width: 100%;
      padding: 0.5rem;
      background: var(--bg-card);
      border: 1px dashed var(--border);
      border-radius: 8px;
      color: var(--text-dim);
      font-size: 0.9rem;
      font-family: inherit;
      cursor: pointer;
      transition: color 0.15s, border-color 0.15s;
    }

    .btn-add-mod:hover {
      color: var(--accent);
      border-color: var(--accent);
    }

    .d20-badge {
      display: inline-flex;
      align-items: center;
      justify-content: center;
      width: 44px;
      height: 44px;
      background: linear-gradient(145deg, #2a2520, #1a1510);
      border: 1px solid var(--d20-gold);
      border-radius: 8px;
      color: var(--d20-gold);
      font-family: 'Cinzel', serif;
      font-weight: 700;
      font-size: 1.25rem;
    }

    .results {
      margin-top: 1.75rem;
      padding-top: 1.5rem;
      border-top: 1px solid var(--border);
    }

    .result-main {
      font-size: 1.5rem;
      font-weight: 700;
      text-align: center;
      margin-bottom: 1rem;
    }

    .result-main .pct {
      color: var(--accent-glow);
      font-family: 'Cinzel', serif;
      letter-spacing: 0.05em;
    }

    .result-detail {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 0.75rem;
      font-size: 0.9rem;
    }

    .result-detail span {
      display: block;
      color: var(--text-dim);
    }

    .result-detail .value {
      color: var(--text);
      font-weight: 600;
    }

    .result-detail .crit-success .value { color: var(--success); }
    .result-detail .crit-fail .value { color: var(--fail); }

    .rule-hint {
      margin-top: 1.25rem;
      padding: 0.75rem 1rem;
      background: var(--bg-card);
      border-radius: 8px;
      border-left: 3px solid var(--accent);
      font-size: 0.85rem;
      color: var(--text-dim);
    }

    .rule-hint strong {
      color: var(--text);
    }

    footer {
      margin-top: 2rem;
      font-size: 0.8rem;
      color: var(--text-dim);
    }
  </style>
</head>
<body>
  <h1>D20 检定概率</h1>
  <p class="subtitle">博德之门3 · 1d20 成功/失败概率</p>

  <div class="panel">
    <div class="row">
      <span class="d20-badge">d20</span>
      <label for="target">检定难度 DC</label>
      <input type="number" id="target" min="1" max="30" value="15" placeholder="目标值">
    </div>
    <div class="row">
      <label for="advantage">检定方式</label>
      <select id="advantage">
        <option value="normal">普通（1d20）</option>
        <option value="advantage">优势（2d20 取高）</option>
        <option value="disadvantage">劣势（2d20 取低）</option>
      </select>
    </div>
    <div class="row modifiers-section">
      <div style="flex: 1; min-width: 0;">
        <div class="section-label">加值（可多个：固定值或骰子，骰子为数量 d 面数）</div>
        <div id="modifierList"></div>
        <button type="button" class="btn-add-mod" id="btnAddMod">+ 添加加值</button>
      </div>
    </div>

    <div class="results">
      <div class="result-main">
        成功概率：<span class="pct" id="pct">50%</span>
      </div>
      <div class="result-detail">
        <div class="result-detail crit-success">
          <span>大成功 (20)</span>
          <span class="value" id="critSuccess">5%</span>
        </div>
        <div class="result-detail crit-fail">
          <span>大失败 (1)</span>
          <span class="value" id="critFail">5%</span>
        </div>
        <div class="result-detail">
          <span>普通成功</span>
          <span class="value" id="normalSuccess">—</span>
        </div>
        <div class="result-detail">
          <span>普通失败</span>
          <span class="value" id="normalFail">—</span>
        </div>
      </div>
    </div>

    <div class="rule-hint">
      <strong>规则：</strong> 掷出 1 视为大失败（必败），掷出 20 视为大成功（必胜）；其余 2–19 与全部加值之和 ≥ DC 则成功。优势 = 掷 2d20 取高，劣势 = 掷 2d20 取低。
    </div>
  </div>

  <footer>DiceCalc · 1d20 检定 · 1=大失败 20=大成功</footer>

  <script>
    const targetInput = document.getElementById('target');
    const advantageSelect = document.getElementById('advantage');
    const modifierListEl = document.getElementById('modifierList');
    const btnAddMod = document.getElementById('btnAddMod');
    const pctEl = document.getElementById('pct');
    const critSuccessEl = document.getElementById('critSuccess');
    const critFailEl = document.getElementById('critFail');
    const normalSuccessEl = document.getElementById('normalSuccess');
    const normalFailEl = document.getElementById('normalFail');

    // 加值列表：{ id, type: 'fixed'|'dice', value }，value 固定为数字，骰子为 "1d4" 等字符串
    let modifiers = [];
    let nextId = 1;

    function clampTarget(v) {
      const n = parseInt(v, 10);
      if (Number.isNaN(n)) return 15;
      return Math.max(1, Math.min(30, n));
    }

    /** 单组骰子 nds 的分布：Map<sum, prob> */
    function diceDistribution(count, sides) {
      let dist = new Map();
      for (let v = 1; v <= sides; v++) dist.set(v, 1 / sides);
      for (let n = 1; n < count; n++) {
        const next = new Map();
        for (const [a, pa] of dist) {
          for (let b = 1; b <= sides; b++) {
            const s = a + b;
            next.set(s, (next.get(s) || 0) + pa / sides);
          }
        }
        dist = next;
      }
      return dist;
    }

    /** 卷积两个分布（和） */
    function convolve(distA, distB) {
      const out = new Map();
      for (const [a, pa] of distA) {
        for (const [b, pb] of distB) {
          const s = a + b;
          out.set(s, (out.get(s) || 0) + pa * pb);
        }
      }
      return out;
    }

    /** 从加值列表得到：固定和 + 骰子和的分布。骰子用 count、sides。 */
    function getModifierDistribution() {
      let fixedSum = 0;
      let diceDist = null;
      for (const m of modifiers) {
        if (m.type === 'fixed') {
          const v = parseInt(m.value, 10);
          if (!Number.isNaN(v)) fixedSum += v;
        } else if (m.type === 'dice') {
          const count = Math.max(1, Math.min(20, parseInt(m.count, 10) || 1));
          const sides = Math.max(2, Math.min(100, parseInt(m.sides, 10) || 4));
          const d = diceDistribution(count, sides);
          diceDist = diceDist ? convolve(diceDist, d) : d;
        }
      }
      return { fixedSum, diceDist };
    }

    /** P(diceSum >= k)，diceDist 为 Map 或 null（无骰子视为 0） */
    function pDiceSumAtLeast(diceDist, k) {
      if (!diceDist || diceDist.size === 0) return k <= 0 ? 1 : 0;
      let p = 0;
      for (const [sum, prob] of diceDist) {
        if (sum >= k) p += prob;
      }
      return p;
    }

    /**
     * 根据检定方式返回 d20 有效结果的概率分布：Map<1..20, prob>
     * 普通：均匀 1/20；优势：2d20 取高；劣势：2d20 取低
     */
    function getD20RollDistribution(mode) {
      const dist = new Map();
      for (let k = 1; k <= 20; k++) dist.set(k, 0);
      if (mode === 'normal') {
        for (let k = 1; k <= 20; k++) dist.set(k, 1 / 20);
        return dist;
      }
      if (mode === 'advantage') {
        // P(max = 1) = 1/400, P(max = 20) = 1 - (19/20)^2 = 39/400, P(max = k) = (2k-1)/400
        dist.set(1, 1 / 400);
        dist.set(20, 39 / 400);
        for (let k = 2; k <= 19; k++) dist.set(k, (2 * k - 1) / 400);
        return dist;
      }
      if (mode === 'disadvantage') {
        // P(min = 1) = 39/400, P(min = 20) = 1/400, P(min = k) = (41-2k)/400
        dist.set(1, 39 / 400);
        dist.set(20, 1 / 400);
        for (let k = 2; k <= 19; k++) dist.set(k, (41 - 2 * k) / 400);
        return dist;
      }
      for (let k = 1; k <= 20; k++) dist.set(k, 1 / 20);
      return dist;
    }

    /**
     * BG3 规则：d20 有效结果 + 加值 vs DC。加值 = 固定和 + 骰子和（分布）
     * d20Dist: Map<1..20, prob>，由普通/优势/劣势决定
     */
    function compute(target, fixedSum, diceDist, d20Dist) {
      const pCritFail = d20Dist.get(1) || 0;
      const pCritSuccess = d20Dist.get(20) || 0;
      let pNormalSuccess = 0;
      for (let roll = 2; roll <= 19; roll++) {
        const need = target - roll - fixedSum;
        pNormalSuccess += (d20Dist.get(roll) || 0) * pDiceSumAtLeast(diceDist, need);
      }
      const pNormalFail = 1 - pCritFail - pCritSuccess - pNormalSuccess;
      const pSuccess = pCritSuccess + pNormalSuccess;
      return {
        pSuccess,
        pCritFail,
        pCritSuccess,
        pNormalSuccess,
        pNormalFail,
      };
    }

    function formatPct(p) {
      return (p * 100).toFixed(1).replace(/\.0$/, '') + '%';
    }

    function renderModifierRow(mod) {
      const row = document.createElement('div');
      row.className = 'modifier-row';
      row.dataset.id = String(mod.id);

      const sel = document.createElement('select');
      sel.innerHTML = '<option value="fixed">固定值</option><option value="dice">骰子</option>';
      sel.value = mod.type;

      const wrap = document.createElement('div');
      wrap.className = 'mod-input';
      wrap.style.display = 'flex';
      wrap.style.gap = '0.5rem';
      wrap.style.alignItems = 'center';

      let inpFixed, inpCount, inpSides, diceBox;

      function showFixed() {
        wrap.innerHTML = '';
        inpFixed = document.createElement('input');
        inpFixed.type = 'number';
        inpFixed.placeholder = '如 5、-2';
        inpFixed.value = mod.value ?? '0';
        inpFixed.addEventListener('input', () => { mod.value = inpFixed.value; update(); });
        inpFixed.addEventListener('change', () => { mod.value = inpFixed.value; update(); });
        wrap.appendChild(inpFixed);
      }

      function showDice() {
        wrap.innerHTML = '';
        diceBox = document.createElement('span');
        diceBox.style.display = 'flex';
        diceBox.style.alignItems = 'center';
        diceBox.style.gap = '0.25rem';
        inpCount = document.createElement('input');
        inpCount.type = 'number';
        inpCount.min = 1;
        inpCount.max = 20;
        inpCount.style.width = '3.5em';
        inpCount.value = (mod.count != null ? mod.count : 1);
        inpSides = document.createElement('input');
        inpSides.type = 'number';
        inpSides.min = 2;
        inpSides.max = 100;
        inpSides.style.width = '3.5em';
        inpSides.value = (mod.sides != null ? mod.sides : 4);
        const dLabel = document.createElement('span');
        dLabel.textContent = 'd';
        dLabel.style.color = 'var(--text-dim)';
        diceBox.appendChild(inpCount);
        diceBox.appendChild(dLabel);
        diceBox.appendChild(inpSides);
        wrap.appendChild(diceBox);
        function sync() {
          mod.count = inpCount.value;
          mod.sides = inpSides.value;
          update();
        }
        inpCount.addEventListener('input', sync);
        inpCount.addEventListener('change', sync);
        inpSides.addEventListener('input', sync);
        inpSides.addEventListener('change', sync);
      }

      sel.addEventListener('change', () => {
        mod.type = sel.value;
        if (mod.type === 'fixed') {
          mod.value = mod.value ?? '0';
          showFixed();
        } else {
          if (mod.count == null) mod.count = 1;
          if (mod.sides == null) mod.sides = 4;
          showDice();
        }
        update();
      });

      if (mod.type === 'fixed') {
        showFixed();
      } else {
        if (mod.count == null) mod.count = 1;
        if (mod.sides == null) mod.sides = 4;
        showDice();
      }

      const btn = document.createElement('button');
      btn.type = 'button';
      btn.className = 'btn-del';
      btn.textContent = '×';
      btn.title = '删除';
      btn.addEventListener('click', () => {
        modifiers = modifiers.filter(m => m.id !== mod.id);
        renderModifierList();
        update();
      });

      row.appendChild(sel);
      row.appendChild(wrap);
      row.appendChild(btn);
      return row;
    }

    function renderModifierList() {
      modifierListEl.innerHTML = '';
      modifiers.forEach(m => modifierListEl.appendChild(renderModifierRow(m)));
    }

    function addModifier(type = 'fixed') {
      if (type === 'dice') {
        modifiers.push({ id: nextId++, type: 'dice', count: 1, sides: 4 });
      } else {
        modifiers.push({ id: nextId++, type: 'fixed', value: '0' });
      }
      renderModifierList();
      update();
    }

    btnAddMod.addEventListener('click', () => addModifier());

    function update() {
      const target = clampTarget(targetInput.value);
      targetInput.value = target;

      const { fixedSum, diceDist } = getModifierDistribution();
      const d20Dist = getD20RollDistribution(advantageSelect.value);
      const r = compute(target, fixedSum, diceDist, d20Dist);

      pctEl.textContent = formatPct(r.pSuccess);
      critSuccessEl.textContent = formatPct(r.pCritSuccess);
      critFailEl.textContent = formatPct(r.pCritFail);
      normalSuccessEl.textContent = formatPct(r.pNormalSuccess);
      normalFailEl.textContent = formatPct(r.pNormalFail);
    }

    targetInput.addEventListener('input', update);
    targetInput.addEventListener('change', update);
    advantageSelect.addEventListener('change', update);

    // 初始无加值，可选：预填一个示例
    renderModifierList();
    update();
  </script>
</body>
</html>
