<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>博德之门3 · 检定概率计算器</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Cinzel:wght@400;600;700&family=Noto+Serif+SC:wght@400;600;700&display=swap" rel="stylesheet">
  <style>
    :root {
      --bg-deep: #0b0e12;
      --bg-panel: #121821;
      --bg-card: #1a2330;
      --bg-soft: #161e29;
      --border: #2b3747;
      --text: #e8edf4;
      --text-dim: #98a4b6;
      --accent: #63b3ff;
      --accent-glow: #a6d4ff;
      --success: #34d399;
      --fail: #f87171;
      --warn: #fbbf24;
      --shadow: 0 20px 50px rgba(0, 0, 0, 0.4);
    }

    * { box-sizing: border-box; }

    body {
      margin: 0;
      min-height: 100vh;
      background: var(--bg-deep);
      color: var(--text);
      font-family: 'Noto Serif SC', serif;
      display: flex;
      justify-content: center;
      padding: 2rem;
      background-image:
        radial-gradient(ellipse 80% 50% at 20% -10%, rgba(99, 179, 255, 0.12), transparent),
        radial-gradient(ellipse 60% 40% at 95% 100%, rgba(52, 211, 153, 0.08), transparent);
    }

    .app-shell { width: min(1080px, 100%); }

    .hero {
      margin-bottom: 1.25rem;
      display: flex;
      align-items: baseline;
      justify-content: space-between;
      gap: 1rem;
    }

    h1 {
      margin: 0;
      font-family: 'Cinzel', 'Noto Serif SC', serif;
      font-size: 2rem;
      color: var(--accent-glow);
      letter-spacing: 0.04em;
      text-shadow: 0 0 18px rgba(166, 212, 255, 0.25);
    }

    .subtitle {
      margin: 0;
      color: var(--text-dim);
      font-size: 0.95rem;
    }

    .panel {
      background: linear-gradient(160deg, rgba(18, 24, 33, 0.95), rgba(20, 27, 36, 0.92));
      border: 1px solid var(--border);
      border-radius: 16px;
      padding: 1.25rem;
      box-shadow: var(--shadow);
      display: grid;
      grid-template-columns: 1.2fr 0.8fr;
      gap: 1rem;
    }

    .controls,
    .results {
      background: rgba(11, 14, 18, 0.38);
      border: 1px solid rgba(43, 55, 71, 0.7);
      border-radius: 12px;
      padding: 1rem;
    }

    .row {
      display: flex;
      align-items: center;
      gap: 0.75rem;
      margin-bottom: 0.9rem;
    }

    .row:last-child { margin-bottom: 0; }

    .row-icon {
      display: inline-flex;
      align-items: center;
      justify-content: center;
      width: 36px;
      height: 36px;
      border-radius: 10px;
      background: var(--bg-soft);
      border: 1px solid var(--border);
      color: var(--accent-glow);
      font-size: 1rem;
    }

    label {
      flex: 0 0 86px;
      color: var(--text-dim);
      font-size: 0.9rem;
    }

    select:not(.modifier-row select),
    input[type="number"],
    input[type="text"] {
      flex: 1;
      min-width: 0;
      background: var(--bg-card);
      border: 1px solid var(--border);
      border-radius: 10px;
      padding: 0.62rem 0.8rem;
      color: var(--text);
      font-size: 1rem;
      font-family: inherit;
      transition: border-color 0.2s, box-shadow 0.2s;
    }

    select:not(.modifier-row select) { cursor: pointer; }

    select:focus,
    input[type="number"]:focus,
    input[type="text"]:focus {
      outline: none;
      border-color: var(--accent);
      box-shadow: 0 0 0 2px rgba(99, 179, 255, 0.2);
    }

    .modifiers-section {
      margin-top: 0.2rem;
      align-items: flex-start;
    }

    .modifiers-section .section-label {
      margin-bottom: 0.55rem;
      color: var(--text-dim);
      font-size: 0.88rem;
    }

    .group-grid {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 0.6rem;
    }

    .group-card {
      border: 1px solid var(--border);
      border-radius: 10px;
      background: var(--bg-soft);
      padding: 0.55rem;
      min-height: 96px;
      display: flex;
      flex-direction: column;
      gap: 0.45rem;
    }

    .group-title {
      color: var(--text-dim);
      font-size: 0.82rem;
      letter-spacing: 0.01em;
    }

    .group-list {
      display: flex;
      flex-direction: column;
      gap: 0.4rem;
      min-height: 34px;
    }

    .mini-row {
      display: flex;
      align-items: center;
      gap: 0.35rem;
      width: 100%;
    }

    .mini-row .token {
      flex: 1;
      min-width: 0;
      border: 1px solid var(--border);
      background: var(--bg-card);
      border-radius: 8px;
      color: var(--text);
      font-size: 0.84rem;
      padding: 0.42rem 0.55rem;
      white-space: nowrap;
      overflow: hidden;
      text-overflow: ellipsis;
    }

    .mini-row .mini-del {
      flex: 0 0 30px;
      height: 30px;
      border: 1px solid var(--border);
      background: var(--bg-card);
      color: var(--text-dim);
      border-radius: 8px;
      cursor: pointer;
      padding: 0;
      line-height: 1;
      transition: all 0.2s;
    }

    .mini-row .mini-del:hover {
      color: var(--fail);
      border-color: var(--fail);
      background: rgba(248, 113, 113, 0.08);
    }

    .group-input {
      flex: 1;
      min-width: 0;
    }

    .group-input.dice-box {
      display: flex;
      align-items: center;
      gap: 0.25rem;
    }

    .group-input.dice-box input {
      width: 3.2em;
      text-align: center;
    }

    .group-input.dice-box .d-sep {
      color: var(--text-dim);
      font-size: 0.86rem;
    }

    .modifier-row {
      display: flex;
      align-items: center;
      gap: 0.45rem;
      margin-bottom: 0.45rem;
    }

    .modifier-row select {
      flex: 0 0 86px;
      background: var(--bg-card);
      border: 1px solid var(--border);
      border-radius: 8px;
      padding: 0.45rem 0.4rem;
      color: var(--text);
      font-size: 0.88rem;
      font-family: inherit;
      cursor: pointer;
    }

    .modifier-row .mod-input { flex: 1; min-width: 0; }
    .modifier-row .mod-input input { width: 100%; }

    .modifier-row .btn-del {
      flex: 0 0 34px;
      height: 34px;
      border-radius: 8px;
      border: 1px solid var(--border);
      background: var(--bg-card);
      color: var(--text-dim);
      cursor: pointer;
      font-size: 0.95rem;
      line-height: 1;
      padding: 0;
      transition: all 0.2s;
    }

    .modifier-row .btn-del:hover {
      color: var(--fail);
      border-color: var(--fail);
      background: rgba(248, 113, 113, 0.08);
    }

    .btn-add-mod {
      width: 100%;
      margin-top: 0.4rem;
      padding: 0.52rem 0.6rem;
      background: var(--bg-card);
      border: 1px dashed var(--border);
      border-radius: 10px;
      color: var(--text-dim);
      font-size: 0.9rem;
      font-family: inherit;
      cursor: pointer;
      transition: all 0.2s;
    }

    .btn-add-mod:hover {
      color: var(--accent-glow);
      border-color: var(--accent);
      background: rgba(99, 179, 255, 0.08);
    }

    .results {
      display: flex;
      flex-direction: column;
      justify-content: space-between;
      gap: 0.85rem;
    }

    .result-main {
      text-align: center;
      background: linear-gradient(180deg, rgba(28, 38, 51, 0.9), rgba(21, 29, 39, 0.85));
      border: 1px solid var(--border);
      border-radius: 12px;
      padding: 0.9rem;
      font-size: 1.06rem;
    }

    .result-main .pct {
      color: var(--accent-glow);
      display: block;
      margin-top: 0.2rem;
      font-family: 'Cinzel', serif;
      font-size: 2.1rem;
      letter-spacing: 0.04em;
      line-height: 1.1;
    }

    .result-detail {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 0.55rem;
    }

    .stat {
      border: 1px solid var(--border);
      background: var(--bg-soft);
      border-radius: 10px;
      padding: 0.55rem 0.65rem;
      min-height: 68px;
    }

    .stat .name {
      color: var(--text-dim);
      font-size: 0.8rem;
      display: block;
      margin-bottom: 0.2rem;
    }

    .stat .value {
      color: var(--text);
      font-weight: 700;
      font-size: 1.05rem;
      letter-spacing: 0.02em;
    }

    .stat.crit-success .value { color: var(--success); }
    .stat.crit-fail .value { color: var(--fail); }
    .stat.normal-success .value { color: var(--accent-glow); }
    .stat.normal-fail .value { color: var(--warn); }

    .rule-hint {
      margin-top: 0.95rem;
      padding: 0.7rem 0.85rem;
      border-radius: 10px;
      border: 1px solid var(--border);
      background: rgba(26, 35, 48, 0.6);
      color: var(--text-dim);
      font-size: 0.82rem;
      line-height: 1.5;
    }

    .rule-hint strong { color: var(--text); }

    footer {
      margin-top: 1rem;
      text-align: center;
      color: var(--text-dim);
      font-size: 0.78rem;
    }

    @media (max-width: 960px) {
      .panel { grid-template-columns: 1fr; }
      .hero { display: block; }
      .subtitle { margin-top: 0.35rem; }
    }
  </style>
</head>
<body>
  <div class="app-shell">
    <div class="hero">
      <h1>🎲 D20 检定计算器</h1>
      <p class="subtitle">博德之门3 · 电脑端简洁布局</p>
    </div>

    <div class="panel">
      <div class="controls">
        <div class="row">
          <span class="row-icon">🎯</span>
          <label for="target">DC 目标</label>
          <input type="number" id="target" min="1" max="99" value="15" placeholder="输入 DC">
        </div>
        <div class="row modifiers-section">
          <span class="row-icon">🧩</span>
          <div style="flex: 1; min-width: 0;">
            <div class="section-label">添加项（优势/劣势最多各 1 个）</div>
            <div class="group-grid">
              <div class="group-card">
                <div class="group-title">⬆️ 优势</div>
                <div class="group-list" id="advList"></div>
                <button type="button" class="btn-add-mod" id="btnAddAdv">➕ 添加优势</button>
              </div>
              <div class="group-card">
                <div class="group-title">⬇️ 劣势</div>
                <div class="group-list" id="disList"></div>
                <button type="button" class="btn-add-mod" id="btnAddDis">➕ 添加劣势</button>
              </div>
              <div class="group-card">
                <div class="group-title">🔢 固定加值</div>
                <div class="group-list" id="fixedList"></div>
                <button type="button" class="btn-add-mod" id="btnAddFixed">➕ 添加固定</button>
              </div>
              <div class="group-card">
                <div class="group-title">🎲 骰子加值</div>
                <div class="group-list" id="diceList"></div>
                <button type="button" class="btn-add-mod" id="btnAddDice">➕ 添加骰子</button>
              </div>
            </div>
          </div>
        </div>
      </div>

      <div class="results">
        <div class="result-main">
          🏆 成功率
          <span class="pct" id="pct">50%</span>
        </div>
        <div class="result-detail">
          <div class="stat crit-success">
            <span class="name">✨ 大成功 (20)</span>
            <span class="value" id="critSuccess">5%</span>
          </div>
          <div class="stat crit-fail">
            <span class="name">💥 大失败 (1)</span>
            <span class="value" id="critFail">5%</span>
          </div>
          <div class="stat normal-success">
            <span class="name">✅ 普通成功</span>
            <span class="value" id="normalSuccess">—</span>
          </div>
          <div class="stat normal-fail">
            <span class="name">❌ 普通失败</span>
            <span class="value" id="normalFail">—</span>
          </div>
        </div>
        <div class="rule-hint">
          <strong>📘 规则：</strong> 1=必败，20=必胜；其余 2-19 需满足
          <strong>d20 + 全部加值 ≥ DC</strong>。优势取高，劣势取低；若优势与劣势同时存在，按普通模式计算。
        </div>
      </div>
    </div>

    <footer>DiceCalc · 1d20 检定 · 图标化简洁界面</footer>
  </div>

  <script>
    const targetInput = document.getElementById('target');
    const advListEl = document.getElementById('advList');
    const disListEl = document.getElementById('disList');
    const fixedListEl = document.getElementById('fixedList');
    const diceListEl = document.getElementById('diceList');
    const btnAddAdv = document.getElementById('btnAddAdv');
    const btnAddDis = document.getElementById('btnAddDis');
    const btnAddFixed = document.getElementById('btnAddFixed');
    const btnAddDice = document.getElementById('btnAddDice');
    const pctEl = document.getElementById('pct');
    const critSuccessEl = document.getElementById('critSuccess');
    const critFailEl = document.getElementById('critFail');
    const normalSuccessEl = document.getElementById('normalSuccess');
    const normalFailEl = document.getElementById('normalFail');

    let nextId = 1;
    let advantages = [];
    let disadvantages = [];
    let fixedModifiers = [];
    let diceModifiers = [];

    function clampTarget(v) {
      const n = parseInt(v, 10);
      if (Number.isNaN(n)) return 15;
      return Math.max(1, Math.min(99, n));
    }

    /** 单组骰子 nds 的分布：Map<sum, prob> */
    function diceDistribution(count, sides) {
      let dist = new Map();
      for (let v = 1; v <= sides; v++) dist.set(v, 1 / sides);
      for (let n = 1; n < count; n++) {
        const next = new Map();
        for (const [a, pa] of dist) {
          for (let b = 1; b <= sides; b++) {
            const s = a + b;
            next.set(s, (next.get(s) || 0) + pa / sides);
          }
        }
        dist = next;
      }
      return dist;
    }

    /** 卷积两个分布（和） */
    function convolve(distA, distB) {
      const out = new Map();
      for (const [a, pa] of distA) {
        for (const [b, pb] of distB) {
          const s = a + b;
          out.set(s, (out.get(s) || 0) + pa * pb);
        }
      }
      return out;
    }

    /** 从加值列表得到：固定和 + 骰子和的分布。 */
    function getModifierDistribution() {
      let fixedSum = 0;
      let diceDist = null;
      for (const m of fixedModifiers) {
        const v = parseInt(m.value, 10);
        if (!Number.isNaN(v)) fixedSum += v;
      }
      for (const m of diceModifiers) {
        const count = Math.max(1, Math.min(20, parseInt(m.count, 10) || 1));
        const sides = Math.max(2, Math.min(100, parseInt(m.sides, 10) || 4));
        const d = diceDistribution(count, sides);
        diceDist = diceDist ? convolve(diceDist, d) : d;
      }
      return { fixedSum, diceDist };
    }

    /** P(diceSum >= k)，diceDist 为 Map 或 null（无骰子视为 0） */
    function pDiceSumAtLeast(diceDist, k) {
      if (!diceDist || diceDist.size === 0) return k <= 0 ? 1 : 0;
      let p = 0;
      for (const [sum, prob] of diceDist) {
        if (sum >= k) p += prob;
      }
      return p;
    }

    /**
     * 根据检定方式返回 d20 有效结果的概率分布：Map<1..20, prob>
     * 普通：均匀 1/20；优势：2d20 取高；劣势：2d20 取低
     */
    function getD20RollDistribution(mode) {
      const dist = new Map();
      for (let k = 1; k <= 20; k++) dist.set(k, 0);
      if (mode === 'normal') {
        for (let k = 1; k <= 20; k++) dist.set(k, 1 / 20);
        return dist;
      }
      if (mode === 'advantage') {
        dist.set(1, 1 / 400);
        dist.set(20, 39 / 400);
        for (let k = 2; k <= 19; k++) dist.set(k, (2 * k - 1) / 400);
        return dist;
      }
      if (mode === 'disadvantage') {
        dist.set(1, 39 / 400);
        dist.set(20, 1 / 400);
        for (let k = 2; k <= 19; k++) dist.set(k, (41 - 2 * k) / 400);
        return dist;
      }
      for (let k = 1; k <= 20; k++) dist.set(k, 1 / 20);
      return dist;
    }

    function getRollMode() {
      const hasAdv = advantages.length > 0;
      const hasDis = disadvantages.length > 0;
      if (hasAdv && hasDis) return 'normal';
      if (hasAdv) return 'advantage';
      if (hasDis) return 'disadvantage';
      return 'normal';
    }

    /**
     * BG3 规则：d20 有效结果 + 加值 vs DC。加值 = 固定和 + 骰子和（分布）
     * d20Dist: Map<1..20, prob>，由普通/优势/劣势决定
     */
    function compute(target, fixedSum, diceDist, d20Dist) {
      const pCritFail = d20Dist.get(1) || 0;
      const pCritSuccess = d20Dist.get(20) || 0;
      let pNormalSuccess = 0;
      for (let roll = 2; roll <= 19; roll++) {
        const need = target - roll - fixedSum;
        pNormalSuccess += (d20Dist.get(roll) || 0) * pDiceSumAtLeast(diceDist, need);
      }
      const pNormalFail = 1 - pCritFail - pCritSuccess - pNormalSuccess;
      const pSuccess = pCritSuccess + pNormalSuccess;
      return { pSuccess, pCritFail, pCritSuccess, pNormalSuccess, pNormalFail };
    }

    function formatPct(p) {
      return (p * 100).toFixed(2).replace(/\.?0+$/, '') + '%';
    }

    function makeDeleteButton(onClick, title = '删除') {
      const btn = document.createElement('button');
      btn.type = 'button';
      btn.className = 'mini-del';
      btn.textContent = '🗑';
      btn.title = title;
      btn.addEventListener('click', onClick);
      return btn;
    }

    function renderAdvDisList(listEl, data, kind) {
      listEl.innerHTML = '';
      if (data.length === 0) return;
      const item = data[0];
      const row = document.createElement('div');
      row.className = 'mini-row';
      const token = document.createElement('div');
      token.className = 'token';
      token.textContent = kind === 'adv' ? '已添加：优势' : '已添加：劣势';
      row.appendChild(token);
      row.appendChild(makeDeleteButton(() => {
        if (kind === 'adv') {
          advantages = [];
          renderAdvDisList(advListEl, advantages, 'adv');
          syncAdvDisButtons();
        } else {
          disadvantages = [];
          renderAdvDisList(disListEl, disadvantages, 'dis');
          syncAdvDisButtons();
        }
        update();
      }, '删除该项'));
      listEl.appendChild(row);
    }

    function renderFixedList() {
      fixedListEl.innerHTML = '';
      fixedModifiers.forEach((mod) => {
        const row = document.createElement('div');
        row.className = 'mini-row';
        const input = document.createElement('input');
        input.className = 'group-input';
        input.type = 'number';
        input.placeholder = '例如 +5 / -2';
        input.value = mod.value ?? '0';
        input.addEventListener('input', () => { mod.value = input.value; update(); });
        input.addEventListener('change', () => { mod.value = input.value; update(); });
        row.appendChild(input);
        row.appendChild(makeDeleteButton(() => {
          fixedModifiers = fixedModifiers.filter(m => m.id !== mod.id);
          renderFixedList();
          update();
        }, '删除固定加值'));
        fixedListEl.appendChild(row);
      });
    }

    function renderDiceList() {
      diceListEl.innerHTML = '';
      diceModifiers.forEach((mod) => {
        const row = document.createElement('div');
        row.className = 'mini-row';
        const box = document.createElement('div');
        box.className = 'group-input dice-box';

        const countInput = document.createElement('input');
        countInput.type = 'number';
        countInput.min = 1;
        countInput.max = 20;
        countInput.value = mod.count != null ? mod.count : 1;

        const dSep = document.createElement('span');
        dSep.className = 'd-sep';
        dSep.textContent = 'd';

        const sidesInput = document.createElement('input');
        sidesInput.type = 'number';
        sidesInput.min = 2;
        sidesInput.max = 100;
        sidesInput.value = mod.sides != null ? mod.sides : 4;

        const sync = () => {
          mod.count = countInput.value;
          mod.sides = sidesInput.value;
          update();
        };
        countInput.addEventListener('input', sync);
        countInput.addEventListener('change', sync);
        sidesInput.addEventListener('input', sync);
        sidesInput.addEventListener('change', sync);

        box.appendChild(countInput);
        box.appendChild(dSep);
        box.appendChild(sidesInput);
        row.appendChild(box);
        row.appendChild(makeDeleteButton(() => {
          diceModifiers = diceModifiers.filter(m => m.id !== mod.id);
          renderDiceList();
          update();
        }, '删除骰子加值'));
        diceListEl.appendChild(row);
      });
    }

    function syncAdvDisButtons() {
      btnAddAdv.disabled = advantages.length >= 1;
      btnAddDis.disabled = disadvantages.length >= 1;
      btnAddAdv.textContent = advantages.length >= 1 ? '✅ 已有优势' : '➕ 添加优势';
      btnAddDis.textContent = disadvantages.length >= 1 ? '✅ 已有劣势' : '➕ 添加劣势';
    }

    function renderAllLists() {
      renderAdvDisList(advListEl, advantages, 'adv');
      renderAdvDisList(disListEl, disadvantages, 'dis');
      renderFixedList();
      renderDiceList();
      syncAdvDisButtons();
    }

    function addAdvantage() {
      if (advantages.length >= 1) return;
      advantages.push({ id: nextId++ });
      renderAllLists();
      update();
    }

    function addDisadvantage() {
      if (disadvantages.length >= 1) return;
      disadvantages.push({ id: nextId++ });
      renderAllLists();
      update();
    }

    function addFixedModifier() {
      fixedModifiers.push({ id: nextId++, value: '0' });
      renderFixedList();
      update();
    }

    function addDiceModifier() {
      diceModifiers.push({ id: nextId++, count: 1, sides: 4 });
      renderDiceList();
      update();
    }

    function update() {
      const target = clampTarget(targetInput.value);
      targetInput.value = target;
      const mode = getRollMode();
      const { fixedSum, diceDist } = getModifierDistribution();
      const d20Dist = getD20RollDistribution(mode);
      const r = compute(target, fixedSum, diceDist, d20Dist);

      pctEl.textContent = formatPct(r.pSuccess);
      critSuccessEl.textContent = formatPct(r.pCritSuccess);
      critFailEl.textContent = formatPct(r.pCritFail);
      normalSuccessEl.textContent = formatPct(r.pNormalSuccess);
      normalFailEl.textContent = formatPct(r.pNormalFail);
    }

    targetInput.addEventListener('input', update);
    targetInput.addEventListener('change', update);
    btnAddAdv.addEventListener('click', addAdvantage);
    btnAddDis.addEventListener('click', addDisadvantage);
    btnAddFixed.addEventListener('click', addFixedModifier);
    btnAddDice.addEventListener('click', addDiceModifier);

    renderAllLists();
    update();
  </script>
</body>
</html>
